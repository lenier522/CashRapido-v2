name: Build Flutter Windows

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Remove flutter_gemma plugin
        run: |
          (Get-Content pubspec.yaml) -notmatch 'flutter_gemma' | Set-Content pubspec.yaml

      - name: Use desktop AI Service
        run: |
          "export 'ai_service_desktop.dart';" | Out-File -Encoding utf8 lib/services/ai_service.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Windows
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
